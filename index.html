<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Interactive Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <!-- Optional: Google Fonts for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header class="search-header">
            <div class="logo">
                <h1>Wordly</h1>
                <span class="subtitle">Interactive Dictionary</span>
            </div>

            <form id="search-form" class="search-box">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search for a word (e.g., 'ephemeral')..."
                    autocomplete="off"
                    required
                >
                <div class="button-group">
                    <button type="submit" id="search-btn">Search</button>
                    <button type="button" id="clear-btn" class="secondary-btn">Clear</button>
                </div>
            </form>
        </header>

        <main id="results-container" class="results-section" aria-live="polite">
            <div class="placeholder-state">
                <p>Enter a word above to see its definition, pronunciation, antonyms, and synonyms.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
